<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | JB Importes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- ESTILO PREMIUM (MANTIDO INLINE POIS É ESPECÍFICO DESTA PÁGINA) --- */
        :root {
            --primary: #0f172a;
            --accent: #3b82f6; 
            --danger: #ef4444;
            --bg: #f1f5f9;
        }

        body { 
            background-color: var(--bg);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            color: #1e293b;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .login-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px);
            padding: 45px 35px; 
            border-radius: 24px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            border: 1px solid #fff;
            text-align: center; 
        }

        .logo-login {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--primary);
            letter-spacing: -1px;
        }
        .logo-login span { color: var(--accent); }
        
        .welcome-text {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        input { 
            width: 100%; 
            padding: 16px 16px 16px 45px;
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            outline: none; 
            font-size: 1rem; 
            box-sizing: border-box; 
            background: #f8fafc;
            color: #334155;
            transition: all 0.3s;
        }
        
        input:focus { 
            border-color: var(--accent); 
            background: #fff; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        input:focus + i { color: var(--accent); }

        .btn-entrar { 
            width: 100%; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 1rem;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-entrar:hover { 
            background: #000; 
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .btn-entrar:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        .btn-voltar-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 25px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }
        .btn-voltar-home:hover {
            background: #e2e8f0;
            color: var(--primary);
        }

        #error-msg {
            background: #fef2f2;
            color: var(--danger);
            font-size: 0.85rem;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border: 1px solid #fee2e2;
            font-weight: 600;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-login">JB<span>Importes</span></div>
            <p class="welcome-text">Painel de Controle Administrativo</p>
            
            <form id="login-form">
                <div class="input-group">
                    <i class="fas fa-envelope"></i> 
                    <input type="email" id="email" placeholder="E-mail de acesso" required autofocus>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i> 
                    <input type="password" id="password" placeholder="Senha de acesso" required>
                </div>
                
                <button type="submit" class="btn-entrar">
                    <span>Entrar no Sistema</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>
            
            <div id="error-msg"></div>
        </div>

        <div style="text-align: center;">
            <a href="../index.html" class="btn-voltar-home">
                <i class="fas fa-store"></i> Voltar para a Loja
            </a>
        </div>
    </div>

    <script type="module" src="../js/auth.js"></script>
</body>
</html>
